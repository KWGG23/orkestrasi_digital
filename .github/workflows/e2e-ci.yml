name: E2E CI

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/e2e-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/e2e-ci.yml'

jobs:
  playwright:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, gd, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Configure backend .env
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=${{ github.workspace }}/backend/database/database.sqlite" >> .env

      - name: Create SQLite database file
        working-directory: backend
        run: touch database/database.sqlite

      - name: Migrate and seed
        working-directory: backend
        # APP_ENV=local (default .env.example) -> AdminSeeder pakai password dev
        # "password", cocok dengan kredensial hardcode di e2e/auth.setup.js.
        run: php artisan migrate --seed --force

      - name: Start backend server
        working-directory: backend
        run: php artisan serve --port=8000 &

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for backend
        run: until curl -sf http://localhost:8000/api/v1/jenis-sampah; do sleep 2; done

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
