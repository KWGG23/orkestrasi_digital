server {
  listen 80;
  server_name _;

  root /var/www/html/public;
  index index.html index.htm index.php;

  sendfile off;

  error_log /dev/stdout info;
  access_log /dev/stdout;

  # Diisi otomatis oleh start.sh image richarvey/nginx-php-fpm kalau
  # REAL_IP_HEADER=1 (lihat Dockerfile) -- supaya IP client asli yang
  # tercatat, bukan IP proxy Render/Cloudflare.
  #real_ip_header X-Forwarded-For;
  #set_real_ip_from 172.16.0.0/12;

  location /.git {
    deny all;
    return 403;
  }

  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-XSS-Protection "1; mode=block";
  add_header X-Content-Type-Options "nosniff";

  charset utf-8;

  # Rewrite semua path yang bukan file fisik ke index.php -- ini yang
  # hilang dari nginx-site.conf DEFAULT bawaan image richarvey/nginx-php-fpm
  # (cuma "try_files $uri $uri/ =404;", tanpa fallback ke index.php), jadi
  # semua route Laravel selain "/" (termasuk /api/v1/*) di-404 oleh nginx
  # sebelum sempat sampai ke PHP-FPM.
  location / {
      try_files $uri $uri/ /index.php?$query_string;
  }

  location = /favicon.ico { access_log off; log_not_found off; }
  location = /robots.txt  { access_log off; log_not_found off; }

  error_page 404 /index.php;

  location ~* \.(jpg|jpeg|gif|png|css|js|ico|webp|tiff|ttf|svg)$ {
    expires 5d;
  }

  location ~ \.php$ {
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_pass unix:/var/run/php-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    include fastcgi_params;
  }

  location ~ /\. {
    log_not_found off;
    deny all;
  }

  location ~ /\.(?!well-known).* {
    deny all;
  }
}
